name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: ✅ Validation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Skill File
        run: |
          echo "===================="
          echo "🔍 Checking Skill file"
          echo "===================="
          if [ -f ".trae/skills/996-agent/SKILL.md" ]; then
            echo "✅ SKILL.md exists"
          else
            echo "❌ SKILL.md not found!"
            exit 1
          fi

      - name: Validate Documentation
        run: |
          echo ""
          echo "===================="
          echo "📚 Checking Documentation"
          echo "===================="
          files=("README.md" "README_EN.md" "LICENSE" "CONTRIBUTING.md" "CODE_OF_CONDUCT.md")
          for f in "${files[@]}"; do
            if [ -f "$f" ]; then
              echo "✅ $f"
            else
              echo "❌ Missing: $f"
              exit 1
            fi
          done

      - name: Validate Docs Folder
        run: |
          echo ""
          echo "===================="
          echo "📂 Checking Docs Folder"
          echo "===================="
          docs=("docs/ARCHITECTURE_EVOLUTION.md" "docs/INFINITE_INVOLUTION.md" "docs/OPEN_SOURCE_VIRAL_GUIDE.md")
          for f in "${docs[@]}"; do
            if [ -f "$f" ]; then
              echo "✅ $f"
            else
              echo "❌ Missing: $f"
              exit 1
            fi
          done

      - name: Success
        run: |
          echo ""
          echo "===================="
          echo "🎉 ALL CHECKS PASSED!"
          echo "===================="
          echo ""
          echo "   _____ __    _____ _____ "
          echo "  |   __|  |  |   __|_   _|"
          echo "  |   __|  |__|   __| | |  "
          echo "  |__|  |_____|_____| |_|  "
          echo ""
          echo "AI works 996, so you don't have to."
          echo ""
